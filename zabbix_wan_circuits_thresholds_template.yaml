zabbix_export:
  version: '6.0'
  date: '2026-07-02T17:00:00Z'
  groups:
    - uuid: '77c74a1ea6964d5285c9c175f761fc97'
      name: 'Templates/Network'
  templates:
    - uuid: 'f334ab22179f4a349cdb588ddfa68b50'
      template: 'Template Network WAN Circuits Custom Thresholds'
      name: 'Template Network WAN Circuits Custom Thresholds'
      description: |
        Template customizado para descobrir automaticamente interfaces WAN (Te0/1/2 e Gi0/0/0) nos roteadores,
        criar triggers dinâmicas de 65% e 95% baseadas na velocidade da placa e configurar gráficos
        com escala Y máxima travada na velocidade real do link (1G ou 10G) e exibição automática das triggers.
      groups:
        - name: 'Templates/Network'
      discovery_rules:
        - uuid: '70e00b1bcd4d484e83e4e26567e97383'
          name: 'WAN Interfaces Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#IFNAME},1.3.6.1.2.1.31.1.1.1.1,{#IFALIAS},1.3.6.1.2.1.31.1.1.1.18]'
          key: net.if.discovery
          delay: 1h
          lifetime: 7d
          filter:
            evaltype: AND
            conditions:
              - macro: '{#IFNAME}'
                value: '^(TenGigabitEthernet0/1/2|GigabitEthernet0/0/0|Te0/1/2|Gi0/0/0)$'
                formulaid: A
          item_prototypes:
            - uuid: '7d46f981d9fa43b3a6ea9b61376e0a6b'
              name: 'Interface {#IFNAME}({#IFALIAS}): Bits received'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.10.{#SNMPINDEX}'
              key: 'net.if.in[ifInOctets.{#SNMPINDEX}]'
              delay: 1m
              history: 31d
              trends: 365d
              units: bps
              value_type: FLOAT
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: '6fe6196b023b4c11b767664df2b7fbb1'
              name: 'Interface {#IFNAME}({#IFALIAS}): Bits sent'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.16.{#SNMPINDEX}'
              key: 'net.if.out[ifOutOctets.{#SNMPINDEX}]'
              delay: 1m
              history: 31d
              trends: 365d
              units: bps
              value_type: FLOAT
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: '08f56ff3dba141e6bfc30112bb6e4b7b'
              name: 'Interface {#IFNAME}({#IFALIAS}): Speed'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.5.{#SNMPINDEX}'
              key: 'net.if.speed[ifSpeed.{#SNMPINDEX}]'
              delay: 5m
              history: 31d
              trends: '0'
              units: bps
              value_type: UNSIGNED
              tags:
                - tag: component
                  value: network
                - tag: interface
                  value: '{#IFNAME}'
          trigger_prototypes:
            - uuid: 'f840931a8bb0407782ab22b67a1c557f'
              expression: 'last(/Template Network WAN Circuits Custom Thresholds/net.if.in[ifInOctets.{#SNMPINDEX}]) > last(/Template Network WAN Circuits Custom Thresholds/net.if.speed[ifSpeed.{#SNMPINDEX}]) * 0.65'
              name: 'Interface {#IFNAME}({#IFALIAS}): High INBOUND Traffic (> 65%)'
              opdata: 'In: {ITEM.LASTVALUE1}'
              priority: WARNING
              manual_close: 'YES'
            - uuid: '0ac321ce12db48aeb04c8dce1f660b6c'
              expression: 'last(/Template Network WAN Circuits Custom Thresholds/net.if.in[ifInOctets.{#SNMPINDEX}]) > last(/Template Network WAN Circuits Custom Thresholds/net.if.speed[ifSpeed.{#SNMPINDEX}]) * 0.95'
              name: 'Interface {#IFNAME}({#IFALIAS}): Critical INBOUND Traffic (> 95%) - CALL'
              opdata: 'In: {ITEM.LASTVALUE1}'
              priority: HIGH
              manual_close: 'YES'
            - uuid: '37c1d1bcb6124791a7b5590ebb9b6be9'
              expression: 'last(/Template Network WAN Circuits Custom Thresholds/net.if.out[ifOutOctets.{#SNMPINDEX}]) > last(/Template Network WAN Circuits Custom Thresholds/net.if.speed[ifSpeed.{#SNMPINDEX}]) * 0.65'
              name: 'Interface {#IFNAME}({#IFALIAS}): High OUTBOUND Traffic (> 65%)'
              opdata: 'Out: {ITEM.LASTVALUE1}'
              priority: WARNING
              manual_close: 'YES'
            - uuid: '8ca7e98061d94fd7ab75d016042d5966'
              expression: 'last(/Template Network WAN Circuits Custom Thresholds/net.if.out[ifOutOctets.{#SNMPINDEX}]) > last(/Template Network WAN Circuits Custom Thresholds/net.if.speed[ifSpeed.{#SNMPINDEX}]) * 0.95'
              name: 'Interface {#IFNAME}({#IFALIAS}): Critical OUTBOUND Traffic (> 95%) - CALL'
              opdata: 'Out: {ITEM.LASTVALUE1}'
              priority: HIGH
              manual_close: 'YES'
          graph_prototypes:
            - uuid: '4ca7dd3691cb4077ad60e20595e7d5d0'
              name: 'Interface {#IFNAME}({#IFALIAS}): Network traffic custom'
              width: '900'
              height: '300'
              show_triggers: 'YES'
              ymin_type: FIXED
              ymax_type: ITEM
              ymax_item_key: 'net.if.speed[ifSpeed.{#SNMPINDEX}]'
              graph_items:
                - color: 00FF00
                  item:
                    host: 'Template Network WAN Circuits Custom Thresholds'
                    key: 'net.if.in[ifInOctets.{#SNMPINDEX}]'
                - sortorder: '1'
                  color: FF0000
                  item:
                    host: 'Template Network WAN Circuits Custom Thresholds'
                    key: 'net.if.out[ifOutOctets.{#SNMPINDEX}]'
