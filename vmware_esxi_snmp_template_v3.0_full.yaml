# =========================================================================================
# METADADOS DO TEMPLATE ZABBIX
# =========================================================================================
# OBJETIVO: Monitoramento de Esxi 8.0.3+ via SNMP e Ping ICMP.
# VERSÃO: 3.0 (Completo - Sem Placas de Rede Físicas)
# RECURSOS:
#   - ICMP Ping (Uptime, Latência, Perda de Pacotes)
#   - Informações Básicas do Host e SNMP
#   - CPU e RAM Físicas (com Cores individuais)
#   - Descoberta automática de Datastores/Discos
#   - Descoberta automática de VMs internas (Nome, CPUs, RAM alocada, S.O. e Status)
# =========================================================================================
zabbix_export:
  version: '6.0'
  date: '2026-07-01T17:00:00Z'
  groups:
    - uuid: '5adcfe3303b64213b7537467edebeedd'
      name: 'Templates/Virtualization'
  templates:
    - uuid: 'b92bcbf871cb416c8b83455a3c660acd'
      template: 'VMware ESXi SNMP Custom V3'
      name: 'VMware ESXi SNMP Custom V3'
      description: |
        OBJETIVO: Monitoramento completo de servidores VMware ESXi via SNMP e Ping ICMP.
        VERSÃO: 3.0 (Sem Placas de Rede Físicas)
        
        RECURSOS:
        - Ping ICMP (Latência, perda de pacotes, status)
        - CPU e Memória RAM
        - Descoberta automática de Datastores
        - Descoberta automática de VMs (vmwVmTable)
      groups:
        - name: 'Templates/Virtualization'
      macros:
        - macro: '{$CPU.UTIL.ATT}'
          value: '80'
        - macro: '{$CPU.UTIL.TROU}'
          value: '90'
        - macro: '{$CPU.UTIL.CRIT}'
          value: '95'
        - macro: '{$MEMORY.UTIL.MAX.ATT}'
          value: '80'
        - macro: '{$MEMORY.UTIL.MAX.TROU}'
          value: '90'
        - macro: '{$MEMORY.UTIL.MAX.CRIT}'
          value: '95'
        - macro: '{$STORAGE.UTIL.MAX.WARN}'
          value: '85'
        - macro: '{$STORAGE.UTIL.MAX.CRIT}'
          value: '95'
        - macro: '{$ICMP.PING.TIME.MAX}'
          value: '150'
        - macro: '{$ICMP.PING.LOSS.MAX}'
          value: '20'
      items:
        # PING ICMP
        - uuid: '8d436a88959d4b8284c4b854ecffd29e'
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          delay: 1m
          history: 7d
          trends: 365d
          tags:
            - tag: component
              value: network
          triggers:
            - uuid: 'c6f908606b1b4e0c95920ff8c7da130d'
              expression: 'max(/VMware ESXi SNMP Custom V3/icmpping,3m)=0'
              name: 'Host is unavailable via ICMP ping'
              priority: DISASTER
              manual_close: 'YES'
              description: 'O host não responde aos pings ICMP nos últimos 3 minutos.'
        - uuid: '74011c4b5dfa46b48bef7f955bab521d'
          name: 'ICMP ping response time'
          type: SIMPLE
          key: icmppingsec
          delay: 1m
          history: 7d
          trends: 365d
          value_type: FLOAT
          units: s
          tags:
            - tag: component
              value: network
          triggers:
            - uuid: '05c3b0993ff947b69594c76167642ed5'
              expression: 'avg(/VMware ESXi SNMP Custom V3/icmppingsec,5m)>{$ICMP.PING.TIME.MAX}/1000'
              name: 'High ICMP ping response time (>= {$ICMP.PING.TIME.MAX}ms)'
              priority: WARNING
              manual_close: 'YES'
              dependencies:
                - name: 'Host is unavailable via ICMP ping'
                  expression: 'max(/VMware ESXi SNMP Custom V3/icmpping,3m)=0'
        - uuid: '85b010609d37443d869153493adf0f14'
          name: 'ICMP loss percentage'
          type: SIMPLE
          key: icmppingloss
          delay: 1m
          history: 7d
          trends: 365d
          value_type: FLOAT
          units: '%'
          tags:
            - tag: component
              value: network
          triggers:
            - uuid: '8cffe6d569a843629d2b6ca93518afbe'
              expression: 'avg(/VMware ESXi SNMP Custom V3/icmppingloss,5m)>{$ICMP.PING.LOSS.MAX}'
              name: 'High ICMP packet loss (>= {$ICMP.PING.LOSS.MAX}%)'
              priority: AVERAGE
              manual_close: 'YES'
              dependencies:
                - name: 'Host is unavailable via ICMP ping'
                  expression: 'max(/VMware ESXi SNMP Custom V3/icmpping,3m)=0'

        # SNMP SYSTEM
        - uuid: '97d6fbfcb5fa451287f35256014d0304'
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.2.1.1.5.0'
          key: system.name
          delay: 1h
          trends: '0'
          value_type: CHAR
          description: 'Nome do host atribuído pelo administrador.'
          inventory_link: NAME
          tags:
            - tag: component
              value: system
        - uuid: 'dfdd9bf0474c49328acad78ea0fb603d'
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.2.1.1.1.0'
          key: system.descr
          delay: 1h
          trends: '0'
          value_type: CHAR
          description: 'Descrição textual do sistema (ex: versão do ESXi).'
          tags:
            - tag: component
              value: system
        - uuid: '4d8cc1b0df744e8e81b7f55ab561b1df'
          name: 'System uptime'
          type: SNMP_AGENT
          snmp_oid: '1.3.6.1.2.1.1.3.0'
          key: system.uptime
          delay: 30s
          history: 7d
          trends: 365d
          units: s
          value_type: FLOAT
          preprocessing:
            - type: MULTIPLIER
              parameters:
                - '0.01'
          description: 'Tempo desde a inicialização do gerenciamento de rede (uptime).'
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: '0fa5d8dff83c442698dff3fdcd9f0c5e'
              expression: 'nodata(/VMware ESXi SNMP Custom V3/system.uptime, 5m) = 1'
              name: 'Host is unavailable (No SNMP data for 5 minutes)'
              priority: DISASTER
              dependencies:
                - name: 'Host is unavailable via ICMP ping'
                  expression: 'max(/VMware ESXi SNMP Custom V3/icmpping,3m)=0'
            - uuid: '9bb8cc232237484a8f15edf83270381a'
              expression: 'last(/VMware ESXi SNMP Custom V3/system.uptime) < 10m'
              name: 'Host has been restarted'
              priority: WARNING
              description: 'O host foi reiniciado há menos de 10 minutos.'
              dependencies:
                - name: 'Host is unavailable (No SNMP data for 5 minutes)'
                  expression: 'nodata(/VMware ESXi SNMP Custom V3/system.uptime, 5m) = 1'

        # CPU UTILIZATION
        - uuid: 'f47ea8873aa54206a978ca9580367d75'
          name: 'CPU average utilization'
          type: CALCULATED
          key: vm.cpu.util
          delay: 1m
          history: 7d
          trends: 365d
          value_type: FLOAT
          units: '%'
          params: 'avg(last_foreach(//hrProcessorLoad[*]))'
          description: 'Média de utilização de CPU calculada dinamicamente entre todos os cores de processamento.'
          tags:
            - tag: component
              value: cpu
          triggers:
            - uuid: '10887105e66443258f8927e746d0b7d5'
              expression: 'last(/VMware ESXi SNMP Custom V3/vm.cpu.util) >= {$CPU.UTIL.ATT}'
              name: 'Average CPU utilization is attention (>= {$CPU.UTIL.ATT}%)'
              priority: WARNING
              dependencies:
                - name: 'Average CPU utilization is trouble (>= {$CPU.UTIL.TROU}%)'
                  expression: 'last(/VMware ESXi SNMP Custom V3/vm.cpu.util) >= {$CPU.UTIL.TROU}'
            - uuid: 'fc4f168aff97432ab3907dc1e3dd19d4'
              expression: 'last(/VMware ESXi SNMP Custom V3/vm.cpu.util) >= {$CPU.UTIL.TROU}'
              name: 'Average CPU utilization is trouble (>= {$CPU.UTIL.TROU}%)'
              priority: AVERAGE
              dependencies:
                - name: 'Average CPU utilization is critical (>= {$CPU.UTIL.CRIT}%)'
                  expression: 'last(/VMware ESXi SNMP Custom V3/vm.cpu.util) >= {$CPU.UTIL.CRIT}'
            - uuid: '0327b4fd7ebd410592faf698df920ca2'
              expression: 'last(/VMware ESXi SNMP Custom V3/vm.cpu.util) >= {$CPU.UTIL.CRIT}'
              name: 'Average CPU utilization is critical (>= {$CPU.UTIL.CRIT}%)'
              priority: HIGH

      discovery_rules:
        # 1. CPU CORE DISCOVERY
        - uuid: 'a4b9dcd56874493495b4d5659d01d4e8'
          name: 'CPU Core Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#CPU_LOAD}, 1.3.6.1.2.1.25.3.3.1.2]'
          key: hrProcessorLoad.discovery
          delay: 1h
          lifetime: '0'
          item_prototypes:
            - uuid: 'b8fc1bed690d40ed90ade1a79ad8b5df'
              name: 'CPU Core {#SNMPINDEX} utilization'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.25.3.3.1.2.{#SNMPINDEX}'
              key: 'hrProcessorLoad[{#SNMPINDEX}]'
              delay: 1m
              history: 7d
              trends: 365d
              value_type: FLOAT
              units: '%'
              description: 'Utilização do core de CPU número {#SNMPINDEX}.'
              tags:
                - tag: component
                  value: cpu

        # 2. PHYSICAL MEMORY DISCOVERY (RAM)
        - uuid: '861ba1ed294c43568316e7ca9d40b532'
          name: 'Physical Memory Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#STORAGE_TYPE},1.3.6.1.2.1.25.2.3.1.2,{#STORAGE_DESCR},1.3.6.1.2.1.25.2.3.1.3]'
          key: vm.memory.discovery
          delay: 1h
          lifetime: '0'
          filter:
            evaltype: AND
            conditions:
              - macro: '{#STORAGE_DESCR}'
                value: '^Real Memory$'
                formulaid: A
          item_prototypes:
            - uuid: 'e10dff70a7cf4966b503702ba03daa0d'
              name: 'Memory Allocation Units'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.25.2.3.1.4.{#SNMPINDEX}'
              key: 'vm.memory.units[{#SNMPINDEX}]'
              delay: 1h
              history: 7d
              trends: '0'
              value_type: UNSIGNED
              units: B
              tags:
                - tag: component
                  value: memory
            - uuid: '200853d24c6141599954455ed9fde3a2'
              name: 'Memory Total Size (raw)'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.25.2.3.1.5.{#SNMPINDEX}'
              key: 'vm.memory.total_raw[{#SNMPINDEX}]'
              delay: 5m
              history: 7d
              trends: '0'
              value_type: UNSIGNED
              tags:
                - tag: component
                  value: memory
            - uuid: 'df39982a85124a49884523f956e7bb80'
              name: 'Memory Used Size (raw)'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.25.2.3.1.6.{#SNMPINDEX}'
              key: 'vm.memory.used_raw[{#SNMPINDEX}]'
              delay: 1m
              history: 7d
              trends: '0'
              value_type: UNSIGNED
              tags:
                - tag: component
                  value: memory
            - uuid: '089682b862b84d22a4e8c3431b6dcb1b'
              name: 'Total Memory'
              type: CALCULATED
              key: 'vm.memory.total[{#SNMPINDEX}]'
              delay: 5m
              history: 7d
              trends: 365d
              value_type: UNSIGNED
              units: B
              params: 'last(//vm.memory.total_raw[{#SNMPINDEX}]) * last(//vm.memory.units[{#SNMPINDEX}])'
              tags:
                - tag: component
                  value: memory
            - uuid: '61a16d0d7a8e4002b07d9ae317df6559'
              name: 'Used Memory'
              type: CALCULATED
              key: 'vm.memory.used[{#SNMPINDEX}]'
              delay: 1m
              history: 7d
              trends: 365d
              value_type: UNSIGNED
              units: B
              params: 'last(//vm.memory.used_raw[{#SNMPINDEX}]) * last(//vm.memory.units[{#SNMPINDEX}])'
              tags:
                - tag: component
                  value: memory
            - uuid: '5e7d91fb7f58474a8ec3702820209e97'
              name: 'Memory Utilization'
              type: CALCULATED
              key: 'vm.memory.util[{#SNMPINDEX}]'
              delay: 1m
              history: 7d
              trends: 365d
              value_type: FLOAT
              units: '%'
              params: 'last(//vm.memory.used[{#SNMPINDEX}]) / last(//vm.memory.total[{#SNMPINDEX}]) * 100'
              tags:
                - tag: component
                  value: memory
          trigger_prototypes:
            - uuid: '37dd03aaedc8492aa6014ee6307cc0c6'
              expression: 'last(/VMware ESXi SNMP Custom V3/vm.memory.util[{#SNMPINDEX}]) >= {$MEMORY.UTIL.MAX.ATT}'
              name: 'Memory utilization is attention (>= {$MEMORY.UTIL.MAX.ATT}%) on {#STORAGE_DESCR}'
              opdata: 'Current: {ITEM.LASTVALUE1} (Used: {?last(//vm.memory.used[{#SNMPINDEX}])} / Total: {?last(//vm.memory.total[{#SNMPINDEX}])})'
              priority: WARNING
              dependencies:
                - name: 'Memory utilization is trouble (>= {$MEMORY.UTIL.MAX.TROU}%) on {#STORAGE_DESCR}'
                  expression: 'last(/VMware ESXi SNMP Custom V3/vm.memory.util[{#SNMPINDEX}]) >= {$MEMORY.UTIL.MAX.TROU}'
            - uuid: '32309bbf01854c0e8d7ee270c6e1173e'
              expression: 'last(/VMware ESXi SNMP Custom V3/vm.memory.util[{#SNMPINDEX}]) >= {$MEMORY.UTIL.MAX.TROU}'
              name: 'Memory utilization is trouble (>= {$MEMORY.UTIL.MAX.TROU}%) on {#STORAGE_DESCR}'
              opdata: 'Current: {ITEM.LASTVALUE1} (Used: {?last(//vm.memory.used[{#SNMPINDEX}])} / Total: {?last(//vm.memory.total[{#SNMPINDEX}])})'
              priority: AVERAGE
              dependencies:
                - name: 'Memory utilization is critical (>= {$MEMORY.UTIL.MAX.CRIT}%) on {#STORAGE_DESCR}'
                  expression: 'last(/VMware ESXi SNMP Custom V3/vm.memory.util[{#SNMPINDEX}]) >= {$MEMORY.UTIL.MAX.CRIT}'
            - uuid: '82f6cb197e914b8e8e178a2afecacdf8'
              expression: 'last(/VMware ESXi SNMP Custom V3/vm.memory.util[{#SNMPINDEX}]) >= {$MEMORY.UTIL.MAX.CRIT}'
              name: 'Memory utilization is critical (>= {$MEMORY.UTIL.MAX.CRIT}%) on {#STORAGE_DESCR}'
              opdata: 'Current: {ITEM.LASTVALUE1} (Used: {?last(//vm.memory.used[{#SNMPINDEX}])} / Total: {?last(//vm.memory.total[{#SNMPINDEX}])})'
              priority: HIGH

        # 3. DATASTORE / STORAGE DISCOVERY (Discos)
        - uuid: 'f102422b8f974483add4b864f94ddb36'
          name: 'Datastore/Storage Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#STORAGE_TYPE},1.3.6.1.2.1.25.2.3.1.2,{#STORAGE_DESCR},1.3.6.1.2.1.25.2.3.1.3]'
          key: vm.storage.discovery
          delay: 1h
          lifetime: '0'
          filter:
            evaltype: AND
            conditions:
              - macro: '{#STORAGE_DESCR}'
                value: '^(Real Memory|Swap Space|Virtual Memory|Memory|page file|Host Memory)'
                operator: NOT_MATCHES_REGEX
                formulaid: A
          item_prototypes:
            - uuid: 'a8bf44a6971244cbafa382458bf77709'
              name: 'Storage {#STORAGE_DESCR}: Allocation units'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.25.2.3.1.4.{#SNMPINDEX}'
              key: 'vm.storage.units[{#SNMPINDEX}]'
              delay: 1h
              history: 7d
              trends: '0'
              value_type: UNSIGNED
              units: B
              tags:
                - tag: component
                  value: storage
            - uuid: 'cdcc7cd319cb4d828e871ae11d5feb28'
              name: 'Storage {#STORAGE_DESCR}: Total raw size'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.25.2.3.1.5.{#SNMPINDEX}'
              key: 'vm.storage.total_raw[{#SNMPINDEX}]'
              delay: 5m
              history: 7d
              trends: '0'
              value_type: UNSIGNED
              tags:
                - tag: component
                  value: storage
            - uuid: '739c7adecff64f32a48350261a756fe1'
              name: 'Storage {#STORAGE_DESCR}: Used raw size'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.25.2.3.1.6.{#SNMPINDEX}'
              key: 'vm.storage.used_raw[{#SNMPINDEX}]'
              delay: 5m
              history: 7d
              trends: '0'
              value_type: UNSIGNED
              tags:
                - tag: component
                  value: storage
            - uuid: 'be465959bcd243558a976976bd00b22b'
              name: 'Storage {#STORAGE_DESCR}: Total space'
              type: CALCULATED
              key: 'vm.storage.total[{#SNMPINDEX}]'
              delay: 5m
              history: 7d
              trends: 365d
              value_type: UNSIGNED
              units: B
              params: 'last(//vm.storage.total_raw[{#SNMPINDEX}]) * last(//vm.storage.units[{#SNMPINDEX}])'
              tags:
                - tag: component
                  value: storage
            - uuid: 'b01f7849128c4df3afaeb4d817fbc59d'
              name: 'Storage {#STORAGE_DESCR}: Used space'
              type: CALCULATED
              key: 'vm.storage.used[{#SNMPINDEX}]'
              delay: 5m
              history: 7d
              trends: 365d
              value_type: UNSIGNED
              units: B
              params: 'last(//vm.storage.used_raw[{#SNMPINDEX}]) * last(//vm.storage.units[{#SNMPINDEX}])'
              tags:
                - tag: component
                  value: storage
            - uuid: '7d5d2f152f9b417ca5392792a963f877'
              name: 'Storage {#STORAGE_DESCR}: Space utilization'
              type: CALCULATED
              key: 'vm.storage.util[{#SNMPINDEX}]'
              delay: 5m
              history: 7d
              trends: 365d
              value_type: FLOAT
              units: '%'
              params: 'last(//vm.storage.used[{#SNMPINDEX}]) / last(//vm.storage.total[{#SNMPINDEX}]) * 100'
              tags:
                - tag: component
                  value: storage
          trigger_prototypes:
            - uuid: 'd15c22506f164c0c9a6f493bd0b9f2b5'
              expression: 'last(/VMware ESXi SNMP Custom V3/vm.storage.util[{#SNMPINDEX}]) >= {$STORAGE.UTIL.MAX.WARN}'
              name: 'Storage {#STORAGE_DESCR}: Space utilization is high (>= {$STORAGE.UTIL.MAX.WARN}%)'
              opdata: 'Current: {ITEM.LASTVALUE1} (Used: {?last(//vm.storage.used[{#SNMPINDEX}])} / Total: {?last(//vm.storage.total[{#SNMPINDEX}])})'
              priority: WARNING
              manual_close: 'YES'
              dependencies:
                - name: 'Storage {#STORAGE_DESCR}: Space utilization is critical (>= {$STORAGE.UTIL.MAX.CRIT}%)'
                  expression: 'last(/VMware ESXi SNMP Custom V3/vm.storage.util[{#SNMPINDEX}]) >= {$STORAGE.UTIL.MAX.CRIT}'
            - uuid: '76463e69f7d442d78a6f33d1bdccc1a7'
              expression: 'last(/VMware ESXi SNMP Custom V3/vm.storage.util[{#SNMPINDEX}]) >= {$STORAGE.UTIL.MAX.CRIT}'
              name: 'Storage {#STORAGE_DESCR}: Space utilization is critical (>= {$STORAGE.UTIL.MAX.CRIT}%)'
              opdata: 'Current: {ITEM.LASTVALUE1} (Used: {?last(//vm.storage.used[{#SNMPINDEX}])} / Total: {?last(//vm.storage.total[{#SNMPINDEX}])})'
              priority: HIGH
              manual_close: 'YES'

        # 4. VIRTUAL MACHINE DISCOVERY (VMs internas)
        - uuid: '0a9bf974f1e24e1d850c9977fa8868aa'
          name: 'VMware VM Discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#VM_NAME},1.3.6.1.4.1.6876.2.1.1.2]'
          key: vmw.vm.discovery
          delay: 1h
          lifetime: '0'
          item_prototypes:
            - uuid: '621f8638160f4d708f3768413053a0be'
              name: 'VM {#VM_NAME}: Configured CPUs'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.6876.2.1.1.3.{#SNMPINDEX}'
              key: 'vmw.vm.cpus[{#SNMPINDEX}]'
              delay: 1h
              history: 7d
              trends: 365d
              value_type: UNSIGNED
              description: 'Quantidade de CPUs virtuais configuradas para a VM.'
              tags:
                - tag: component
                  value: virtual-machine
            - uuid: 'abc07479bbb34e27979a3a5b6eb4930f'
              name: 'VM {#VM_NAME}: Configured RAM'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.6876.2.1.1.4.{#SNMPINDEX}'
              key: 'vmw.vm.memory[{#SNMPINDEX}]'
              delay: 1h
              history: 7d
              trends: 365d
              value_type: UNSIGNED
              units: B
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '1048576'
              description: 'Quantidade de memória RAM alocada para a VM (convertido de MB para Bytes).'
              tags:
                - tag: component
                  value: virtual-machine
            - uuid: '515e9edcde644e74a8b6982afdfbebad'
              name: 'VM {#VM_NAME}: Guest OS'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.6876.2.1.1.5.{#SNMPINDEX}'
              key: 'vmw.vm.guestos[{#SNMPINDEX}]'
              delay: 1h
              history: 7d
              trends: '0'
              value_type: CHAR
              description: 'Sistema operacional configurado na máquina virtual.'
              tags:
                - tag: component
                  value: virtual-machine
            - uuid: '2ea2234ebe6f4f3bbc3fef2d38674f2d'
              name: 'VM {#VM_NAME}: Power state'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.6876.2.1.1.8.{#SNMPINDEX}'
              key: 'vmw.vm.state[{#SNMPINDEX}]'
              delay: 5m
              history: 7d
              trends: 365d
              value_type: UNSIGNED
              valuemap:
                name: 'VM State'
              description: 'Estado atual de energia da VM (poweredOn, poweredOff, suspended).'
              tags:
                - tag: component
                  value: virtual-machine
              trigger_prototypes:
                - uuid: '8cee5ee2fbab47d0a7b474e03f42d1ee'
                  expression: 'last(/VMware ESXi SNMP Custom V3/vmw.vm.state[{#SNMPINDEX}]) <> 1'
                  name: 'VM {#VM_NAME}: is not running (State: {ITEM.LASTVALUE})'
                  priority: WARNING
                  manual_close: 'YES'
                  description: 'A máquina virtual não está ativa/ligada (poweredOn) no hypervisor.'
                  tags:
                    - tag: scope
                      value: availability

      valuemaps:
        - uuid: 'dece4bd1ce4648688b2e6012a671326c'
          name: 'VM State'
          mappings:
            - value: '1'
              newvalue: poweredOn
            - value: '2'
              newvalue: poweredOff
            - value: '3'
              newvalue: suspended
